<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademik - SCHOMIS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <div class="content-header">
                <h1>CLASSES</h1>
                <div class="kelas-dropdown">
                    <span class="breadcrumb-kelas" id="dropdownToggle">-  &#9662;</span>
                    <div class="kelas-dropdown-menu" id="dropdownMenu"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-toolbar" style="justify-content: flex-end;">
                    <a href="#" id="linkKenaikanKelas" class="btn-tambah" style="text-decoration:none; display:inline-block;">Data Kenaikan Kelas</a>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th rowspan="2" style="vertical-align: middle;">NIS</th>
                            <th rowspan="2" style="vertical-align: middle;">Nama</th>
                            <th colspan="3" style="text-align:center;">Mata Pelajaran</th>
                            <th rowspan="2" style="vertical-align: middle;">Rata Rata</th>
                            <th rowspan="2" style="vertical-align: middle;">Aksi</th>
                        </tr>
                        <tr>
                            <th>Matematika</th>
                            <th>B.Inggris</th>
                            <th>B.Indonesia</th>
                        </tr>
                    </thead>
                    <tbody id="tabelNilai"></tbody>
                </table>
                <p class="empty-state" id="emptyState" style="display:none;">Belum ada siswa di kelas ini.</p>
            </div>
        </main>
    </div>

    <!-- MODAL EDIT NILAI -->
    <div class="modal-overlay" id="modalNilai">
        <div class="modal-box">
            <h2>Edit Nilai</h2>
            <form id="formNilai">
                <input type="hidden" id="siswaIdNilai">
                <div class="modal-grid">
                    <div class="form-group">
                        <label>NIS</label>
                        <input type="text" id="nisTampil" disabled>
                    </div>
                    <div class="form-group">
                        <label>Nama Siswa</label>
                        <input type="text" id="namaTampil" disabled>
                    </div>
                </div>
                <p style="font-weight:600; margin: 0.8rem 0 0.5rem; font-size:0.9rem;">Mata Pelajaran</p>
                <div class="modal-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                    <div class="form-group">
                        <label for="nilaiMatematika">Matematika</label>
                        <input type="number" id="nilaiMatematika" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="nilaiInggris">B.Inggris</label>
                        <input type="number" id="nilaiInggris" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="nilaiIndonesia">B.Indonesia</label>
                        <input type="number" id="nilaiIndonesia" min="0" max="100" required>
                    </div>
                </div>
                <p class="message error" id="pesanModal"></p>
                <div class="modal-actions">
                    <button type="button" class="btn-batal" id="btnBatalModal">Batal</button>
                    <button type="submit" class="btn-simpan">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/sidebar.js"></script>
    <script src="/js/akademik.js"></script>
    <script>renderSidebar('akademik');</script>
</body>
</html>
