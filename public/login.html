<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCHOMIS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo-side">
                <img src="/img/logo.png" alt="Logo Sekolah Nusantara">
            </div>
            <div class="auth-form-side">
                <h1>SCHOMIS</h1>
                <p class="subtitle">School Management Information System</p>

                <form id="formLogin" novalidate>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn-primary">SIGN IN</button>

                    <p class="message" id="pesan"></p>
                </form>

                <p class="link-text">Tidak punya akun? <a href="/register.html">Buat akun baru</a></p>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
